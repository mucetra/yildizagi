// CLAUDE API
// ═══════════════════════════════════════════════
const callClaude=async(prompt,maxT=500)=>{
const r=await fetch(“https://api.anthropic.com/v1/messages”,{
method:“POST”,
headers:{“Content-Type”:“application/json”,“anthropic-version”:“2023-06-01”,“anthropic-dangerous-direct-browser-access”:“true”},
body:JSON.stringify({model:“claude-sonnet-4-20250514”,max_tokens:maxT,messages:[{role:“user”,content:prompt}]})
});
if(!r.ok) throw new Error(`API ${r.status}`);
const d=await r.json();
return d.content?.find(b=>b.type===“text”)?.text?.trim()||””;
};

const generateLevel=async(num)=>{
const diff=num<=5?“kolay”:num<=30?“orta”:“zor”;
const sz=num<=5?3:num<=30?4:5;
const eg=Array(sz).fill(“KELİME”).join(’”,”’);
const ih=Array(sz).fill(“İpucu”).join(’”,”’);
const txt=await callClaude(
`Türkçe kelime zinciri bulmacası SEVİYE ${num} oluştur. SADECE JSON döndür, başka hiçbir şey yazma: {"startWord":"X","endWord":"Y","chain":["${eg}"],"hints":["${ih}"],"theme":"Tema"} KURALLAR: Türkçe büyük harf, yaygın kelimeler, zorluk:${diff}, tam ${sz} ara kelime, bitişik kelimeler arasında açık kavramsal bağ, ipuçları cevabı vermeden yönlendirici.`,800);
const parsed=JSON.parse(txt.replace(/`json|`/g,””).trim());
return{…parsed,id:num,diff};
};

};

// ═══════════════════════════════════════════════
// KOZMİK MÜZİK
// ═══════════════════════════════════════════════
class CosmicMusic{
constructor(){this.ctx=null;this.master=null;this.srcs=[];this.tmr=null;this.on=false;}
start(){
if(this.on) return;
const AC=window.AudioContext||window.webkitAudioContext;
if(!AC) return;
this.ctx=new AC();this.on=true;
this.master=this.ctx.createGain();
this.master.gain.setValueAtTime(0,this.ctx.currentTime);
this.master.gain.linearRampToValueAtTime(0.055,this.ctx.currentTime+4);
this.master.connect(this.ctx.destination);
// Drones
[[54.8,.18],[82.4,.12],[109.7,.08],[164.8,.06]].forEach(([f,v])=>this._drone(f,v));
// Melody
this._melody();
}
_drone(freq,vol){
const o=this.ctx.createOscillator(),g=this.ctx.createGain();
const lfo=this.ctx.createOscillator(),lg=this.ctx.createGain();
o.type=‘sine’;o.frequency.value=freq;
lfo.frequency.value=0.08+Math.random()*0.04;lg.gain.value=0.4;
lfo.connect(lg);lg.connect(o.frequency);lfo.start();
g.gain.value=vol;o.connect(g);g.connect(this.master);o.start();
this.srcs.push(o,lfo);
}
_melody(){
const notes=[220,261.6,293.7,329.6,392,440,523.3,587.3,659.3];
const play=()=>{
if(!this.ctx||!this.on) return;
const f=notes[Math.floor(Math.random()*notes.length)];
const o=this.ctx.createOscillator(),e=this.ctx.createGain();
o.type=‘sine’;o.frequency.value=f;
const t=this.ctx.currentTime;
e.gain.setValueAtTime(0,t);
e.gain.linearRampToValueAtTime(0.35,t+.7);
e.gain.exponentialRampToValueAtTime(0.001,t+5);
o.connect(e);e.connect(this.master);o.start(t);o.stop(t+5);
this.tmr=setTimeout(play,1800+Math.random()*4500);
};
this.tmr=setTimeout(play,2000);
}
stop(){
this.on=false;
clearTimeout(this.tmr);
if(this.master&&this.ctx){
this.master.gain.linearRampToValueAtTime(0,this.ctx.currentTime+1.5);
setTimeout(()=>{
this.srcs.forEach(s=>{try{s.stop()}catch(e){}});
if(this.ctx) this.ctx.close();
this.ctx=null;this.master=null;this.srcs=[];
},1800);
}
}
}

const SFX=(type)=>{

const t=(f,st,dur,shape=‘sine’,v=0.7)=>{
const o=ctx.createOscillator(),g=ctx.createGain();
o.type=shape;o.frequency.value=f;
g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(v,st+.03);
g.gain.exponentialRampToValueAtTime(.001,st+dur);
o.connect(g);g.connect(m);o.start(st);o.stop(st+dur);
};
if(type===‘click’){t(650,now,.07);t(1100,now+.02,.05);}
else if(type===‘found’){[330,392,523].forEach((f,i)=>t(f,now+i*.1,1.1));}
else if(type===‘win’){
for(let i=0;i<16;i++) t(200*Math.pow(1.45,i/2),now+i*.07,2.4);
setTimeout(()=>{[523,659,784,1047].forEach((f,i)=>t(f,ctx.currentTime+i*.05,3));},1100);
}
else if(type===‘hint’){for(let i=0;i<8;i++) t(900+Math.random()*1800,now+Math.random()*.4,.18,‘sine’,.2);}

              <Loader2 size={13} style={{animation:'spinSlow 1s linear infinite'}}/><span style={{fontSize:'11px',letterSpacing:'.1em'}}>Kavramsal bağlantı hesaplanıyor...</span>
            </div>
            :<p style={{fontSize:'12px',color:'rgba(255,255,255,.5)',lineHeight:1.6,fontStyle:'italic'}}>{winExpl}</p>
          }
        </div>

        <div style={{display:'flex',alignItems:'center',gap:'6px',color:'rgb(253,230,138)',fontSize:'11px',fontWeight:'700',letterSpacing:'.12em',background:'rgba(120,60,0,.2)',padding:'7px 16px',borderRadius:'20px',border:'1px solid rgba(251,191,36,.2)',animation:'ringPulse 2s ease-in-out infinite'}}>
          <Sparkles size={12}/>+2 YILDIZ TOZU
        </div>

        <div style={{width:'1px',height:'30px',background:'linear-gradient(to bottom, rgba(255,255,255,.3), transparent)'}}/>
        <button onClick={doNext}
          style={{padding:'13px 36px',background:'white',color:'black',fontWeight:'700',letterSpacing:'.2em',fontSize:'12px',borderRadius:'40px',border:'none',cursor:'pointer',transition:'transform .15s',boxShadow:'0 0 25px rgba(255,255,255,.18)'}}
          onMouseEnter={e=>e.target.style.transform='scale(1.04)'}
          onMouseLeave={e=>e.target.style.transform='scale(1)'}>
          DEVAM ET
        </button>
      </div>
    </div>
  )}

  {/* Info modal — constellation info */}
  {infoModal&&(
    <div style={{position:'fixed',inset:0,zIndex:55,background:'rgba(0,0,0,.88)',backdropFilter:'blur(16px)',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px'}}>
      <div className="glass-dark anim-fade-up" style={{borderRadius:'24px',padding:'28px 24px',maxWidth:'380px',width:'100%',maxHeight:'80vh',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'18px'}}>
          <h3 className="f-cinzel" style={{fontSize:'16px',letterSpacing:'.25em',color:'white'}}>{constData.name}</h3>
          <button onClick={()=>{play('click');setInfoModal(false);}} style={{background:'none',border:'none',color:'rgba(255,255,255,.3)',cursor:'pointer',padding:'4px'}}><X size={18}/></button>
        </div>
        <p style={{fontSize:'11px',color:'rgba(165,180,252,.6)',letterSpacing:'.1em',marginBottom:'12px',fontFamily:'Space Mono'}}>{constData.latin}</p>
        <p style={{fontSize:'13px',color:'rgba(255,255,255,.65)',lineHeight:1.7,marginBottom:'14px'}}>{constData.fact}</p>
        <p style={{fontSize:'12px',color:'rgba(255,255,255,.4)',lineHeight:1.65,borderTop:'1px solid rgba(255,255,255,.06)',paddingTop:'14px',fontStyle:'italic'}}>{constData.myth}</p>
      </div>
    </div>
  )}

  <ConfirmModal c={confirm} setC={setConfirm} play={play} onReset={doReset} onQuit={doQuit} onLogout={doLogout}/>
</div>

);
}

// ───────────────────────────────────────────────
function ConfirmModal({c,setC,play,onReset,onQuit,onLogout}){
if(!c) return null;
const cfgs={
reset:{icon:<AlertTriangle style={{color:‘rgb(251,191,36)’,width:40,height:40}}/>,title:“SIFIRLA?”,body:“Tüm ilerleme ve yıldız tozları silinir.”,btn:“SIFIRLA”,bStyle:{background:‘rgb(217,119,6)’},action:onReset},
quit:{icon:<Home style={{color:‘rgba(255,255,255,.7)’,width:40,height:40}}/>,title:“ÇIKIŞ?”,body:“İlerleme kaydedildi. Ana menüye dön.”,btn:“ÇIK”,bStyle:{background:‘white’,color:‘black’},action:onQuit},
logout:{icon:<LogOut style={{color:‘rgb(248,113,113)’,width:40,height:40}}/>,title:“OTURUMU KAPAT?”,body:“Giriş ekranına dönülecek.”,btn:“KAPAT”,bStyle:{background:‘rgb(220,38,38)’},action:onLogout},
};
const cf=cfgs[c];
return(
<div style={{position:‘fixed’,inset:0,zIndex:70,background:‘rgba(0,0,0,.9)’,backdropFilter:‘blur(16px)’,display:‘flex’,alignItems:‘center’,justifyContent:‘center’,padding:‘20px’}}>
<div className=“glass-dark anim-fade-up” style={{borderRadius:‘24px’,padding:‘32px 24px’,maxWidth:‘320px’,width:‘100%’,textAlign:‘center’}}>
<div style={{display:‘flex’,flexDirection:‘column’,alignItems:‘center’,gap:‘16px’}}>
{cf.icon}
<div>
<h3 className=“f-cinzel” style={{fontSize:‘18px’,letterSpacing:’.25em’,color:‘white’,marginBottom:‘6px’}}>{cf.title}</h3>
<p style={{fontSize:‘13px’,color:‘rgba(255,255,255,.35)’}}>{cf.body}</p>
</div>
<div style={{display:‘flex’,gap:‘10px’,width:‘100%’}}>
<button onClick={()=>{play(‘click’);setC(null);}} style={{flex:1,padding:‘12px’,borderRadius:‘12px’,background:‘transparent’,border:‘1px solid rgba(255,255,255,.1)’,color:‘rgba(255,255,255,.45)’,cursor:‘pointer’,fontSize:‘11px’,fontWeight:‘700’,letterSpacing:’.12em’,transition:‘background .15s’}} onMouseEnter={e=>e.currentTarget.style.background=‘rgba(255,255,255,.06)’} onMouseLeave={e=>e.currentTarget.style.background=’’}>İPTAL</button>
<button onClick={()=>{play(‘click’);cf.action();}} style={{flex:1,padding:‘12px’,borderRadius:‘12px’,border:‘none’,color:‘white’,cursor:‘pointer’,fontSize:‘11px’,fontWeight:‘700’,letterSpacing:’.12em’,transition:‘opacity .15s’,…cf.bStyle}} onMouseEnter={e=>e.currentTarget.style.opacity=’.85’} onMouseLeave={e=>e.currentTarget.style.opacity=‘1’}>{cf.btn}</button>
</div>
</div>
</div>
</div>
);
}

createRoot(document.getElementById(‘root’)).render(<App/>);
</script>
