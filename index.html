// ─── SES ──────────────────────────────────────────
var AC = null;
var masterGain = null;
var compressor = null;

function getAC() {
if (!AC) {
var Cls = window.AudioContext || window.webkitAudioContext;
if (!Cls) return null;
AC = new Cls();
compressor = AC.createDynamicsCompressor();
compressor.threshold.value = -20;
compressor.ratio.value = 4;
compressor.attack.value = 0.003;
compressor.release.value = 0.15;
masterGain = AC.createGain();
masterGain.gain.value = 0.5;
masterGain.connect(compressor);
compressor.connect(AC.destination);
}
if (AC.state === ‘suspended’) AC.resume();
return AC;
}

function tone(freq, start, dur, vol, type) {
var c = getAC(); if (!c) return;
var o = c.createOscillator();
var g = c.createGain();
o.type = type || ‘sine’;
o.frequency.value = freq;
g.gain.setValueAtTime(0, start);
g.gain.linearRampToValueAtTime(vol || 0.5, start + 0.015);
g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
o.connect(g);
g.connect(masterGain);
o.start(start);
o.stop(start + dur + 0.05);
}

function sfx(type) {
var c = getAC(); if (!c) return;
var n = c.currentTime;
if (type===‘click’) { tone(800,n,.05,.3); tone(1200,n+.01,.04,.2); }
else if (type===‘word’) { [440,554,659,880].forEach(function(f,i){ tone(f,n+i*.06,.7,.4); }); }
else if (type===‘level’) { for(var i=0;i<10;i++) tone(200*Math.pow(1.42,i/2),n+i*.05,2,.25); }
else if (type===‘hint’) { [600,900,1200].forEach(function(f,i){ tone(f,n+i*.08,.12,.12); }); }
else if (type===‘reward’) { [587,740,880].forEach(function(f,i){ tone(f,n+i*.05,.8,.3); }); }
else if (type===‘error’) { tone(130,n,.18,.2,‘triangle’); }
}

// ─── MÜZİK ────────────────────────────────────────
var musOn = false;
var musOscs = [];
var musTimers = [];

function startMusic() {
if (musOn) return;
var c = getAC(); if (!c) return;
musOn = true;
// Drone — çok düşük seviye
[[65.4,.05],[98,.04],[130.8,.03]].forEach(function(pair) {
var o = c.createOscillator(), g = c.createGain();
o.type = ‘sine’; o.frequency.value = pair[0];
g.gain.setValueAtTime(0, c.currentTime);
g.gain.linearRampToValueAtTime(pair[1], c.currentTime+5);
o.connect(g); g.connect(masterGain); o.start();
musOscs.push(o, g);
});
// Yavaş melodi
var notes = [261.6,329.6,392,440,523.3];
function playNote() {
if (!musOn) return;
var ac = getAC(); if (!ac) return;
var f = notes[Math.floor(Math.random()*notes.length)];
var o = ac.createOscillator(), g = ac.createGain();
o.type = ‘sine’; o.frequency.value = f;
var now = ac.currentTime;
g.gain.setValueAtTime(0, now);
g.gain.linearRampToValueAtTime(0.022, now+1.2);
g.gain.setValueAtTime(0.022, now+4);
g.gain.linearRampToValueAtTime(0, now+6.5);
o.connect(g); g.connect(masterGain);
o.start(now); o.stop(now+7);
musTimers.push(setTimeout(playNote, 9000+Math.random()*8000));
}
musTimers.push(setTimeout(playNote, 3000));
}

function stopMusic() {
musOn = false;
musTimers.forEach(function(t){ clearTimeout(t); });
musTimers = [];
var c = getAC();
musOscs.forEach(function(x){
if (x && x.gain) {
try { x.gain.linearRampToValueAtTime(0, c.currentTime+1.5); } catch(e){}
}
if (x && x.stop) {
setTimeout(function(){ try{ x.stop(); }catch(e){} }, 1600);
}
});
musOscs = [];
}

useEffect(function(){

}, [lvl]);

var chain = lvlData ? lvlData.chain : [];
var hints = lvlData ? lvlData.hints : [];

function nodeClick(i) {
play(‘click’);
if (found.includes(i)) return;
if (i>0 && !found.includes(i-1)) { play(‘error’); showMsg(“Önce önceki yıldızı aydınlat”); return; }
setSel(i); setAiTxt(null);
}

function procInput(val) {
if (sel===null) return;
var t = chain[sel];
var u = val.toLocaleUpperCase(‘tr-TR’);
if (u.length <= t.length) {
setGuesses(function(g){ var n=Object.assign({},g); n[sel]=u; return n; });
if (u===t) doCorrect(sel);
}
}

function doBack() {
if (sel===null) return;
var c = guesses[sel]||’’;
if (c.length>0) setGuesses(function(g){ var n=Object.assign({},g); n[sel]=c.slice(0,-1); return n; });
}

function doCorrect(idx) {
play(‘word’);
var nf = found.concat([idx]);
setFound(nf);
var usedHint = hintN.has(idx);
setDust(function(d){ return d+1+(usedHint?0:1); });
play(‘reward’);
if (!usedHint) {
var ns = streak+1; setStreak(ns);
if (ns>0 && ns%3===0) { play(‘hint’); setDust(function(d){ return d+1; }); showMsg(‘🔥 ‘+ns+’ seri! +1 bonus’); }
} else { setStreak(0); }
setTimeout(function(){
setSel(null);
if (nf.length===chain.length) {
setTimeout(function(){
play(‘level’);
setShowWin(true); setWinLoad(true);
explainChain(chain).then(function(e){ setWinExpl(e); setWinLoad(false); });
}, 400);
}
}, 380);
}

function doLetterHint() {
if (sel===null||animStar) return;
if (dust<1) { play(‘error’); showMsg(“Yıldız tozu yetersiz”); return; }
play(‘hint’);
setHintN(function(s){ var n=new Set(s); n.add(sel); return n; });
var t = chain[sel], c = (guesses[sel]||’’).toLocaleUpperCase(‘tr-TR’);
var ni = 0;
for (var i=0;i<t.length;i++) { if(c[i]!==t[i]){ni=i;break;} ni=i+1; }
if (ni>=t.length) return;
setDust(function(d){ return d-1; });
var sl = sRefs.current[ni]; if (!sl) return;
var r = sl.getBoundingClientRect();
var sx=window.innerWidth*.86, sy=35;
setAnimStar({sx:sx,sy:sy,tx:r.left+r.width/2-sx,ty:r.top+r.height/2-sy});
setTimeout(function(){
var nv = c.substring(0,ni)+t[ni]+c.substring(ni+1);
setGuesses(function(g){ var n=Object.assign({},g); n[sel]=nv; return n; });
setHIdx(ni); setTimeout(function(){setHIdx(null);},900);
if (nv===t) doCorrect(sel);
setAnimStar(null);
}, 1700);
}

function doAIHint() {
if (sel===null) return;
if (dust<2) { play(‘error’); showMsg(“Yetersiz (2 toz gerekli)”); return; }
play(‘hint’);
setHintN(function(s){ var n=new Set(s); n.add(sel); return n; });
setDust(function(d){ return d-2; });
setAiLoad(true); setAiTxt(null);
var prev = sel>0&&found.includes(sel-1)?chain[sel-1]:’?’;
var next = sel<chain.length-1?chain[sel+1]||’?’:’?’;
getAIHint(chain[sel], hints[sel], prev, next)
.then(function(h){ setAiTxt(h); setAiLoad(false); });
}

function doReveal() {
if (sel===null) return;
if (dust<3) { play(‘error’); showMsg(“Yetersiz (3 toz gerekli)”); return; }
play(‘hint’);
setHintN(function(s){ var n=new Set(s); n.add(sel); return n; });
setDust(function(d){ return d-3; });
setGuesses(function(g){ var n=Object.assign({},g); n[sel]=chain[sel]; return n; });
doCorrect(sel);
}
